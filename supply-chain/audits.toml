[[audits.libc]]
criteria = "safe-to-deploy"
version = "0.2.186"
notes = """
libc 0.2.186 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Raw system-call bindings for seccomp-BPF, privilege-drop, and pledge wrappers
(THREAT-022..024, THREAT-029).  No build script network access; unsafe usage
is inherent to FFI with the C standard library.
"""

[[audits.quinn]]
criteria = "safe-to-deploy"
version = "0.11.9"
notes = """
quinn 0.11.9 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Pure Rust QUIC v1 implementation over tokio; no build script; unsafe usage
restricted to interaction with the OS network stack via std.  Used for DoQ
and DoH/3 (ADR-0028, ADR-0050).
"""

[[audits.redis]]
criteria = "safe-to-run"
version = "0.27.6"
notes = """
redis 0.27.6 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27) for
supply-chain risk only (safe-to-run).  Full correctness audit deferred.
No unexpected network access in build script; no embedded binaries.
Used for RPZ dynamic reload and segregated cache (ADR-0042).
Upgrade to safe-to-deploy once full correctness review is complete.
"""

[[audits.ring]]
criteria = "safe-to-deploy"
version = "0.17.14"
notes = """
ring 0.17.14 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Build script compiles BoringSSL-derived C and assembly; no unexpected network
access; source matches crates.io tarball.  Cryptographic correctness delegated
to the upstream BoringSSL audit trail and the ring project's own CI.
Used as the TLS 1.3 cryptographic back-end via rustls (ADR-0027).
"""

[[audits.rustls]]
criteria = "safe-to-deploy"
version = "0.23.39"
notes = """
rustls 0.23.39 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Pure Rust TLS 1.3 implementation; no build script; no unsafe beyond necessary
FFI boundary with ring.  TLS 1.2 explicitly disabled (SEC-003, ADR-0027).
"""

[[audits.serde]]
criteria = "safe-to-deploy"
