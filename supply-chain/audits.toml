[[audits.hyper]]
criteria = "safe-to-deploy"
version = "1.9.0"
notes = """
hyper 1.9.0 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
HTTP/1.1 + HTTP/2 server/client (ADR-0029).  No unexpected build-script
