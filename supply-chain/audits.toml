
# cargo-vet audits file

[[audits.arc-swap]]
criteria = "safe-to-deploy"
version = "1.9.1"
notes = """
arc-swap 1.9.1 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Lock-free atomic Arc swapping for hot-reload paths (ADR-0037).  Unsafe usage
is correctly reasoned about in the crate documentation and has been validated
by the loom test suite.
"""

[[audits.bytes]]
criteria = "safe-to-deploy"
version = "1.11.1"
notes = """
bytes 1.11.1 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Zero-copy byte buffer used throughout the networking stack (ADR-0049).
Unsafe usage is well-contained (custom allocator hooks, atomic ref-counting).
"""

[[audits.deadpool]]
