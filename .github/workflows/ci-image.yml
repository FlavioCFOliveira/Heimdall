# Image smoke tests — Sprint 48 tasks #482, #483, #484, #485, #486, #546, and #487.
# Builds the container image for linux/amd64 and runs:
#   - tests/image/smoke_ready.sh: verifies container starts and becomes ready within 10s
#   - tests/image/smoke_dns.sh:   verifies authoritative UDP+TCP DNS responses from outside
#   - tests/image/smoke_dot.sh:   verifies DoT TLS 1.3 succeeds and TLS 1.2 is rejected
#   - tests/image/smoke_doh_h2.sh: verifies DoH HTTP/2 GET+POST return application/dns-message
#   - tests/image/smoke_doh_h3.sh: verifies DoH HTTP/3 GET+POST + Alt-Svc on H2 path
#   - tests/image/smoke_doq.sh:    verifies DoQ QUIC v1 NOERROR+AA+RDATA
#
# Implements the CI gate required by task #482 AC: "Smoke test green in CI.
# Failure to ready in 5s fails CI."
# Implements the CI gate required by task #483 AC: "Both UDP and TCP green.
# CI failure on any drift (rcode, RR count, or RDATA)."
# Implements the CI gate required by task #484 AC: "TLS 1.3 query succeeds.
# TLS 1.2 attempt: handshake fails (no shared protocol)."
# Implements the CI gate required by task #485 AC: "GET and POST green.
# Content-Type strictly application/dns-message. Cache-Control header per spec."
# Implements the CI gate required by task #486 AC: "H3 GET + POST green.
# Alt-Svc header present in H2 responses pointing at H3."
# Implements the CI gate required by task #546 AC: "DoQ green. Stream framing valid."
# Implements the CI gate required by task #487 AC: "All N responses complete.
# No truncated bodies. Exit code 0."

name: CI — image smoke

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - "crates/**"
      - "contrib/heimdall.toml.example"
      - "tests/image/**"
      - ".github/workflows/ci-image.yml"
  pull_request:
    paths:
      - Dockerfile
      - "crates/**"
      - "contrib/heimdall.toml.example"
      - "tests/image/**"
      - ".github/workflows/ci-image.yml"

jobs:
  smoke:
    name: container image smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: heimdall:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run readiness smoke test
        env:
          IMAGE: heimdall:test
          READY_TIMEOUT: "10"
        run: bash tests/image/smoke_ready.sh

      - name: Install DNS tools (dnsutils, knot-dnsutils)
        run: sudo apt-get install -y dnsutils knot-dnsutils

      - name: Run DNS query/response smoke test
        env:
          IMAGE: heimdall:test
          DNS_PORT: "5300"
          READY_TIMEOUT: "15"
          SKIP_UDP: "0"
        run: bash tests/image/smoke_dns.sh

      - name: Run DoT smoke test
        env:
          IMAGE: heimdall:test
          DOT_PORT: "8853"
          READY_TIMEOUT: "15"
        run: bash tests/image/smoke_dot.sh

      - name: Run DoH HTTP/2 smoke test
        env:
          IMAGE: heimdall:test
          DOH_PORT: "8443"
          READY_TIMEOUT: "15"
        run: bash tests/image/smoke_doh_h2.sh

      - name: Run DoH HTTP/3 smoke test
        env:
          IMAGE: heimdall:test
          DOH_H2_PORT: "8444"
          DOH_H3_PORT: "8445"
          READY_TIMEOUT: "15"
          SKIP_H3: "0"
        run: bash tests/image/smoke_doh_h3.sh

      - name: Run DoQ smoke test
        env:
          IMAGE: heimdall:test
          DOQ_PORT: "8853"
          READY_TIMEOUT: "15"
          SKIP_DOQ: "0"
        run: bash tests/image/smoke_doq.sh

      - name: Run graceful drain smoke test
        env:
          IMAGE: heimdall:test
          DNS_PORT: "5301"
          DRAIN_TIMEOUT: "15"
          N_QUERIES: "8"
        run: bash tests/image/smoke_drain.sh

      - name: Show container image size
        run: |
          SIZE=$(docker image inspect heimdall:test --format '{{.Size}}')
          SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
          echo "Image size: ${SIZE_MB} MB"
          # AC: image must be < 50 MB
          python3 -c "
          import sys
          size = $SIZE
          limit = 50 * 1024 * 1024
          if size >= limit:
              print(f'FAIL: image size {size/1024/1024:.1f} MB exceeds 50 MB limit')
              sys.exit(1)
          else:
              print(f'PASS: image size {size/1024/1024:.1f} MB < 50 MB')
          "
