# Release workflow — hardened minimal OCI container image.
# Implements ENV-026, ENV-033, and ENV-063 through ENV-070 from
# specification/009-target-environment.md §2.20.
#
# Builds a multi-arch distroless image and pushes it to GHCR with the
# conventional tags: vX.Y.Z, vX.Y, vX, and latest (on GA releases only).
#
# Supply-chain provenance (ENV-030, THREAT-013/014, Sprint 48 task #490):
#   - cosign keyless sign: image signature bound to OIDC workflow identity.
#   - syft CycloneDX SBOM: full component list from Cargo.lock + OS layer.
#   - cosign attest: SBOM predicate attached to the signed image digest.
#   - verify job: re-runs cosign verify + cosign verify-attestation in CI.
#
# Scan-before-push (ENV-069):
#   A dedicated `scan` job builds the linux/amd64 image locally (no push),
#   runs Trivy + Grype, and must pass before the multi-arch push proceeds.
#   This satisfies ENV-069 which requires scanning prior to registry upload.

name: Release — container

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/heimdall

jobs:
  # ── ENV-069: vulnerability scan BEFORE push ───────────────────────────────
  # Builds the linux/amd64 image locally (load: true, no push) and runs
  # both Trivy and Grype.  CRITICAL or HIGH vulnerabilities with a fix
  # available cause this job to fail and prevent the multi-arch push.
  # Findings are uploaded as SARIF artefacts for the Security tab.
  scan:
    name: vulnerability scan (pre-push)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64 image (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: heimdall:release-scan
          build-args: SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy — production image ──────────────────────────────────────────
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: heimdall:release-scan
          format: sarif
          output: trivy-release.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release

      # ── Grype — production image ──────────────────────────────────────────
      - name: Grype scan (SARIF)
        uses: anchore/scan-action@v4
        with:
          image: heimdall:release-scan
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: grype-release.sarif

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-release.sarif
          category: grype-release

      - name: Upload scan artefacts (ENV-069)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-scan-${{ github.ref_name }}
          path: |
            trivy-release.sarif
            grype-release.sarif

  # ── Build and push multi-arch image ──────────────────────────────────────
  # Only runs after the scan job passes (ENV-069).
  build-push:
    name: build + push container image
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # For cosign OIDC signing.
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM from source
        run: syft dir:. --output cyclonedx-json=sbom.json

      - name: Compute label metadata
        id: meta
        run: |
          SBOM_DIGEST="sha256:$(sha256sum sbom.json | cut -d' ' -f1)"
          RFC3339=$(date -u -d "@$SOURCE_DATE_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
          SLSA_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/.github/workflows/release-container.yml"
          echo "sbom_digest=$SBOM_DIGEST"  >> "$GITHUB_OUTPUT"
          echo "rfc3339=$RFC3339"          >> "$GITHUB_OUTPUT"
          echo "slsa_url=$SLSA_URL"        >> "$GITHUB_OUTPUT"

      - name: Upload SBOM artifact (for sbom attestation job)
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

      - name: Compute image tags
        id: tags
        run: |
          TAG="${{ github.ref_name }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS="${IMAGE}:${TAG}"

          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            MINOR=$(echo "$TAG" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.[0-9]*/v\1.\2/')
            MAJOR=$(echo "$TAG" | sed 's/v\([0-9]*\)\.[0-9]*\.[0-9]*/v\1/')
            TAGS="${TAGS},${IMAGE}:${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Image tags: $TAGS"

      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/riscv64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.rfc3339 }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Sign the image with cosign (keyless OIDC) ─────────────────────────────
  sign:
    name: sign image
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image by digest
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}"

  # ── Attest SBOM to image (SBOM was generated in build-push) ─────────────
  sbom:
    name: attest SBOM (CycloneDX)
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate sbom.json \
            --type cyclonedx \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}"

  # ── Verify image labels, signature, and SBOM attestation ──────────────────
  verify:
    name: verify image labels + signature + SBOM
    needs: [build-push, sign, sbom]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and inspect image labels
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          docker pull "$IMAGE"

          echo "=== Image labels ==="
          docker inspect "$IMAGE" --format '{{json .Config.Labels}}' | jq .

          echo "=== Non-root user check ==="
          IMG_USER=$(docker inspect "$IMAGE" --format '{{.Config.User}}')
          if [ "$IMG_USER" = "root" ] || [ -z "$IMG_USER" ]; then
            echo "ERROR: Container image must not run as root" >&2
            exit 1
          fi
          echo "Non-root user confirmed: $IMG_USER"

          echo "=== Required label check ==="
          FAIL=0
          for lbl in \
              org.opencontainers.image.version \
              org.opencontainers.image.revision \
              org.opencontainers.image.created
          do
            VAL=$(docker inspect "$IMAGE" \
              --format "{{index .Config.Labels \"${lbl}\"}}" 2>/dev/null || true)
            if [ -z "$VAL" ]; then
              echo "FAIL: label missing or empty: $lbl" >&2
              FAIL=1
            else
              echo "OK: $lbl=$VAL"
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
          echo "PASS: all required OCI labels present"

      - name: Verify cosign image signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/release-container.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}"

      - name: Verify SBOM attestation
        run: |
          # cosign verify-attestation exits non-zero if verification fails.
          # jq decodes and logs the predicate type of the first attestation.
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/release-container.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}" \
          | jq -r 'first | .payload | @base64d | fromjson |
              "PASS: CycloneDX attestation verified — predicateType=\(.predicateType)"'
