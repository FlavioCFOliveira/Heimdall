# Release workflow — static musl .tar.gz artefacts + SHA256SUMS manifest.
# Implements ENV-024 and ENV-029 from specification/009-target-environment.md.
#
# Produces statically-linked binaries for each supported Linux architecture and
# packages them as .tar.gz archives.  The SHA256SUMS manifest is signed with
# cosign.  Triggered from the parent release workflow or independently on tags.
#
# Build strategy (ENV-045, ENV-047):
#   x86_64  → ubuntu-latest         (GitHub-hosted, native x86_64)
#   aarch64 → ubuntu-24.04-arm      (GitHub-hosted, native ARM64)
#   riscv64 → [self-hosted,linux,riscv64]  (dedicated runner, ENV-047)
#
# Cross-compilation via `cross` is forbidden for official release artefacts
# (ENV-047).  The riscv64 job is marked experimental and does not block the
# release gate until the dedicated runner is provisioned.

name: Release — tar.gz

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_call:
    outputs:
      artefacts-name:
        description: "Name of the uploaded artefacts bundle"
        value: ${{ jobs.package.outputs.artefacts-name }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Static build matrix ────────────────────────────────────────────────────
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental == true }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── x86_64 static musl — GitHub-hosted native ─────────────────────
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            install-musl: true
            experimental: false
          # ── aarch64 static musl — GitHub-hosted ARM64 native ──────────────
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            install-musl: true
            experimental: false
          # ── riscv64 glibc — self-hosted native riscv64 runner ─────────────
          # riscv64gc-unknown-linux-musl is not yet stable in rustup (ENV-022);
          # glibc is used until the musl triple reaches Tier 2.
          - runner: [self-hosted, linux, riscv64]
            target: riscv64gc-unknown-linux-gnu
            install-musl: false
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: targz-${{ matrix.target }}
          cache-on-failure: true

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Install musl-tools (musl targets only)
        if: matrix.install-musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Configure musl linker (musl targets only)
        if: matrix.install-musl
        run: |
          TARGET_VAR="$(echo '${{ matrix.target }}' | tr '[:lower:].-' '[:upper:]__')_LINKER"
          echo "CARGO_TARGET_${TARGET_VAR}=musl-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

      - name: Strip binary (musl static targets)
        if: matrix.install-musl
        run: strip target/${{ matrix.target }}/release/heimdall || true

      - name: Stage binary with release name
        run: |
          src="target/${{ matrix.target }}/release/heimdall"
          dst="heimdall-${{ github.ref_name }}-${{ matrix.target }}"
          cp "$src" "$dst"
          echo "BINARY=$dst" >> "$GITHUB_ENV"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY }}
          path: ${{ env.BINARY }}

  # ── Package into .tar.gz + SHA256SUMS ──────────────────────────────────────
  package:
    name: package + checksum
    needs: build
    runs-on: ubuntu-latest
    outputs:
      artefacts-name: ${{ steps.meta.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: "heimdall-*"
      - name: Package each binary into a .tar.gz
        id: meta
        run: |
          cd dist
          TAG="${{ github.ref_name }}"
          # Binaries are staged as heimdall-TAG-TARGET (unique names per arch).
          for f in heimdall-${TAG}-*; do
            [ -f "$f" ] || continue
            archive="${f}.tar.gz"
            tar czf "$archive" "$f"
            echo "Packaged: $archive"
          done
          sha256sum *.tar.gz | sort > SHA256SUMS
          cat SHA256SUMS
          echo "name=release-targz-${TAG}" >> "$GITHUB_OUTPUT"
      - name: Upload all artefacts
        uses: actions/upload-artifact@v7
        with:
          name: release-targz-${{ github.ref_name }}
          path: dist/

  # ── Sign SHA256SUMS with cosign ────────────────────────────────────────────
  sign-checksums:
    name: sign SHA256SUMS
    needs: package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download packaged artefacts
        uses: actions/download-artifact@v4
        with:
          name: release-targz-${{ github.ref_name }}
          path: dist/
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign SHA256SUMS
        run: |
          cosign sign-blob --yes dist/SHA256SUMS \
            --bundle dist/SHA256SUMS.cosign.bundle
      - name: Upload signed manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-checksums-${{ github.ref_name }}
          path: |
            dist/SHA256SUMS
            dist/SHA256SUMS.cosign.bundle

  # ── Attach to GitHub Release ────────────────────────────────────────────────
  attach:
    name: attach to release
    needs: sign-checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all dist artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: "release-*-${{ github.ref_name }}"
          path: release/
          merge-multiple: true
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          fail_on_unmatched_files: false
