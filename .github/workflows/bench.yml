# Performance regression gate (Sprint 35, Task #356).
#
# Runs on every pull-request targeting main.  The benchmark suite is executed
# with criterion's `bencher` output format so that results can be uploaded as
# an artifact.  Full regression comparison against a main-branch baseline is
# deferred until the CI integration sprint provides artifact-download tooling.

name: Performance regression gate

on:
  pull_request:
    branches: [main]

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks (current)
        run: cargo bench -p heimdall-bench -- --output-format bencher | tee bench-current.txt

      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-current.txt

      - name: Check for regressions (stub)
        run: |
          echo "Regression comparison requires baseline artifact from main branch — deferred to CI integration sprint"
