global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: heimdall-auth
    static_configs:
      - targets: ["heimdall-auth:9081"]

  - job_name: heimdall-recursive
    static_configs:
      - targets: ["heimdall-recursive:9082"]

  - job_name: heimdall-forwarder
    static_configs:
      - targets: ["heimdall-forwarder:9083"]
