# Tier 4 CI — release gates
# Implements ENG-072..075 and ENG-176 in specification/010-engineering-policies.md.
# Triggered only on version tags (vMAJOR.MINOR.PATCH or pre-release variants).
# Every Tier 1, Tier 2, and Tier 3 check MUST be green before this workflow
# is expected to produce a publishable artefact.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ── ENG-072: verify Tier 1 + 2 + 3 green ────────────────────────────────
  # Checks that the required CI workflows have passed for this commit.
  # In a full configuration this would use required status checks on the tag;
  # here we perform an advisory check and document the manual verification
  # requirement until branch protection + tag protection are configured.
  tier-gate:
    name: tier gate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Tier 1 / 2 / 3 passing (advisory)
        run: |
          echo "=== Tier 4 gate: ENG-072 ==="
          echo "Release tag: ${{ github.ref_name }}"
          echo ""
          echo "REQUIREMENT: Every Tier 1, Tier 2, and Tier 3 check must"
          echo "have passed on the commit being tagged before proceeding."
          echo ""
          echo "Until programmatic cross-workflow status checks are wired,"
          echo "the release engineer MUST verify this manually:"
          echo "  1. CI Tier 1 (ci-tier1.yml) — all jobs green on tagged commit"
          echo "  2. CI Tier 2 (ci-tier2.yml) — all jobs green on tagged commit"
          echo "  3. CI Tier 3 (ci-tier3.yml) — most recent nightly run green"
          echo ""
          echo "Proceeding with artefact build step."

  # ── Build matrix ─────────────────────────────────────────────────────────
  # Compiles release artefacts for the supported target matrix defined in
  # specification/009-target-environment.md (ENV-001..ENV-026).
  build:
    name: build (${{ matrix.target }})
    needs: tier-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: heimdall
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: heimdall
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: heimdall
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (musl targets)
        if: contains(matrix.target, 'musl')
        run: cargo install cross --locked
      - name: Build release binary (native)
        if: "!contains(matrix.target, 'musl')"
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Build release binary (cross / musl)
        if: contains(matrix.target, 'musl')
        run: cross build --locked --release --target ${{ matrix.target }}
      - name: Rename binary
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="${{ matrix.binary }}-${{ github.ref_name }}-${{ matrix.target }}"
          cp "$src" "$dst"
          echo "BINARY=$dst" >> "$GITHUB_ENV"
      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: ${{ env.BINARY }}

  # ── ENG-073: artefact signing (sigstore / cosign) ─────────────────────────
  # Signs every release binary with cosign (keyless, OIDC-backed sigstore
  # transparency log) as required by THREAT-013.
  sign:
    name: sign artefacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC token used by cosign keyless signing.
      contents: write   # Required to upload signatures to the GitHub release.
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artefacts/
          merge-multiple: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign all binaries (keyless / OIDC)
        run: |
          for f in artefacts/heimdall-*; do
            echo "Signing $f..."
            cosign sign-blob --yes "$f" \
              --bundle "${f}.cosign.bundle"
          done
      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: signatures-${{ github.ref_name }}
          path: artefacts/*.cosign.bundle

  # ── ENG-074: SBOM publication ─────────────────────────────────────────────
  # Generates and attaches a CycloneDX SBOM to the release (THREAT-014).
  # The same CVE identifier referenced in GHSA advisories must be present here
  # for security releases (ENG-176).
  sbom:
    name: SBOM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          cargo cyclonedx --format json \
            --output-file "sbom-${{ github.ref_name }}.cdx.json"
        continue-on-error: true
      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom-${{ github.ref_name }}.cdx.json
        if: always()

  # ── ENG-075: GitHub Release with MSRV in release notes ───────────────────
  # Creates the GitHub Release, attaches signed binaries, signatures, and SBOM,
  # and ensures the release notes state the MSRV (ENG-005, ENG-006).
  publish:
    name: publish release
    needs: [sign, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep '^rust-version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "MSRV=$msrv" >> "$GITHUB_OUTPUT"
      - name: Download all release artefacts
        uses: actions/download-artifact@v4
        with:
          path: release-artefacts/
          merge-multiple: true
      - name: List artefacts
        run: ls -lh release-artefacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artefacts/**
          body: |
            ## Heimdall ${{ github.ref_name }}

            **Minimum Supported Rust Version (MSRV): ${{ steps.msrv.outputs.MSRV }}**

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            for the full list of changes in this release.

            ### Artefact verification

            Release binaries are signed with [cosign](https://github.com/sigstore/cosign)
            using keyless OIDC signing backed by the Sigstore transparency log.
            Each binary ships with a `.cosign.bundle` file; verify with:

            ```
            cosign verify-blob \
              --bundle heimdall-${{ github.ref_name }}-<target>.cosign.bundle \
              heimdall-${{ github.ref_name }}-<target>
            ```

            A CycloneDX Software Bill of Materials (`sbom-${{ github.ref_name }}.cdx.json`)
            is included in this release per THREAT-014.
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
