# Minimal CI workflow stub (Sprint 35, Task #356).
#
# This file exists as a stub for tooling that looks for a canonical "ci.yml"
# entry point.  The authoritative CI gates for Heimdall are implemented in
# ci-tier1.yml, ci-tier2.yml, and ci-tier3.yml.

name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    # Heimdall E2E tests spawn the daemon, which fails closed if Redis is
    # unreachable (BIN-050, STORE-005..016). The runner needs a Redis service.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        # `--test-threads=1` serializes intra-binary test execution. Many E2E
        # tests spawn the heimdall daemon on a port allocated via free_port();
        # parallel execution is racy because UDP has no TIME_WAIT, so two
        # near-simultaneous binds on a recycled port collide with EADDRINUSE.
        run: cargo test --workspace -- --test-threads=1

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check
