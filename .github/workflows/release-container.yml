# Release workflow — hardened minimal OCI container image.
# Implements ENV-026, ENV-033, and ENV-063 through ENV-070 from
# specification/009-target-environment.md §2.20.
#
# Builds a multi-arch distroless image and pushes it to GHCR with the
# conventional tags: vX.Y.Z, vX.Y, vX, and latest (on GA releases only).
#
# Supply-chain provenance (ENV-030, THREAT-013/014, Sprint 48 task #490):
#   - cosign keyless sign: image signature bound to OIDC workflow identity.
#   - syft CycloneDX SBOM: full component list from Cargo.lock + OS layer.
#   - cosign attest: SBOM predicate attached to the signed image digest.
#   - verify job: re-runs cosign verify + cosign verify-attestation in CI.

name: Release — container

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/heimdall

jobs:
  build-push:
    name: build + push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # For cosign OIDC signing.
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate the CycloneDX SBOM from the source tree BEFORE building the
      # image so we can embed its sha256 digest as a deterministic image label.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM from source
        run: syft dir:. --output cyclonedx-json=sbom.json

      # Derive all per-build label values.  Using only git-deterministic inputs
      # (sha, SOURCE_DATE_EPOCH, ref_name, SBOM digest) guarantees that two
      # parallel builds on the same commit produce byte-identical manifests.
      - name: Compute label metadata
        id: meta
        run: |
          SBOM_DIGEST="sha256:$(sha256sum sbom.json | cut -d' ' -f1)"
          RFC3339=$(date -u -d "@$SOURCE_DATE_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
          # SLSA provenance pointer: workflow file URL at the exact commit.
          SLSA_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/.github/workflows/release-container.yml"
          echo "sbom_digest=$SBOM_DIGEST"  >> "$GITHUB_OUTPUT"
          echo "rfc3339=$RFC3339"          >> "$GITHUB_OUTPUT"
          echo "slsa_url=$SLSA_URL"        >> "$GITHUB_OUTPUT"

      - name: Upload SBOM artifact (for sbom attestation job)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

      - name: Compute image tags
        id: tags
        run: |
          TAG="${{ github.ref_name }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS="${IMAGE}:${TAG}"

          # Semantic version breakdown: vX.Y.Z → also tag vX.Y and vX.
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            MINOR=$(echo "$TAG" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.[0-9]*/v\1.\2/')
            MAJOR=$(echo "$TAG" | sed 's/v\([0-9]*\)\.[0-9]*\.[0-9]*/v\1/')
            TAGS="${TAGS},${IMAGE}:${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Image tags: $TAGS"

      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/riscv64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.rfc3339 }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            heimdall.sbom.cyclonedx.digest=${{ steps.meta.outputs.sbom_digest }}
            heimdall.provenance.slsa=${{ steps.meta.outputs.slsa_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Sign the image with cosign (keyless OIDC) ─────────────────────────────
  sign:
    name: sign image
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image by digest
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}"

  # ── Attest SBOM to image (SBOM was generated in build-push) ─────────────
  sbom:
    name: attest SBOM (CycloneDX)
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      # Download the SBOM generated in build-push (same content embedded in label).
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Attach the CycloneDX SBOM as a signed attestation on the image digest.
      # The sha256 of this file matches the heimdall.sbom.cyclonedx.digest label.
      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate sbom.json \
            --type cyclonedx \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}"

  # ── Verify image labels, signature, and SBOM attestation ──────────────────
  verify:
    name: verify image labels + signature + SBOM
    needs: [build-push, sign, sbom]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and inspect image labels
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          docker pull "$IMAGE"
          echo "=== Image labels ==="
          docker inspect "$IMAGE" --format '{{json .Config.Labels}}' | python3 -m json.tool

          echo "=== Non-root user check ==="
          USER=$(docker inspect "$IMAGE" --format '{{.Config.User}}')
          if [ "$USER" = "root" ] || [ -z "$USER" ]; then
            echo "ERROR: Container image must not run as root" >&2
            exit 1
          fi
          echo "Non-root user confirmed: $USER"

          echo "=== Required label check ==="
          python3 - <<PYEOF
import json, subprocess, sys
result = subprocess.run(
    ["docker", "inspect", "${IMAGE}", "--format", "{{json .Config.Labels}}"],
    capture_output=True, text=True, check=True,
)
labels = json.loads(result.stdout.strip())
required = [
    "org.opencontainers.image.version",
    "org.opencontainers.image.revision",
    "org.opencontainers.image.created",
    "org.opencontainers.image.documentation",
    "heimdall.sbom.cyclonedx.digest",
    "heimdall.provenance.slsa",
]
missing = [k for k in required if k not in labels or not labels[k]]
if missing:
    print(f"FAIL: missing or empty labels: {missing}", file=sys.stderr)
    sys.exit(1)
print("PASS: all required OCI labels present")
for k in required:
    print(f"  {k}: {labels[k]}")
PYEOF

      # Verify the keyless OIDC signature (proves the image was built by this
      # workflow; rejects any tampered or third-party-signed image).
      - name: Verify cosign image signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/release-container.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}"

      # Verify the CycloneDX SBOM attestation is present and correctly signed.
      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/release-container.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}" \
          | python3 -c "
import base64, json, sys
for raw in sys.stdin:
    raw = raw.strip()
    if not raw:
        continue
    envelope = json.loads(raw)
    payload = json.loads(base64.b64decode(envelope.get('payload', '') + '=='))
    pred_type = payload.get('predicateType', '')
    if 'cyclonedx' in pred_type.lower():
        comps = payload.get('predicate', {}).get('components', [])
        print(f'PASS: CycloneDX SBOM attestation verified — {len(comps)} components')
        sys.exit(0)
print('FAIL: no CycloneDX attestation found in output', file=sys.stderr)
sys.exit(1)
"
