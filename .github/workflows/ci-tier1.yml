# Tier 1 CI — per-pull-request fast gates
# Implements ENG-046..053 in specification/010-engineering-policies.md.
# Target: ≤10 minutes end-to-end wall-clock on hosted Linux x86_64.
#
# Matrix:
#   - Hosted runners: Linux x86_64, macOS aarch64 (development-only)
#   - Self-hosted runners: Linux aarch64, Linux riscv64, BSD x86_64
#     (provisioned separately; jobs marked continue-on-error until runners available)
#
# All checks must pass before a PR is eligible for merge (ENG-156).

name: CI Tier 1

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ── ENG-046: cargo build --locked on MSRV ──────────────────────────────────
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
          - os: macos-aarch64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: Verify MSRV matches rust-version in Cargo.toml
        run: |
          DECLARED=$(grep '^rust-version' Cargo.toml | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/')
          ACTUAL=$(rustc --version | awk '{print $2}')
          if [ "$DECLARED" != "$ACTUAL" ]; then
            echo "MSRV mismatch: Cargo.toml declares $DECLARED but rustc is $ACTUAL" >&2
            exit 1
          fi
      - name: cargo build --locked
        run: cargo build --locked --all-targets

  # ── ENG-047: cargo test ────────────────────────────────────────────────────
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
          - os: macos-aarch64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --locked --all-targets

  # ── ENG-048: cargo fmt --check ─────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV) with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── ENG-049: cargo clippy -D warnings ─────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV) with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  # ── ENG-050: cargo deny check ─────────────────────────────────────────────
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ── ENG-051: cargo audit ───────────────────────────────────────────────────
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  # ── ENG-052: cargo vet check ───────────────────────────────────────────────
  vet:
    name: vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: cargo vet check
        run: cargo vet check

  # ── ENG-053: cargo doc --no-deps ──────────────────────────────────────────
  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: cargo doc --no-deps
        run: cargo doc --locked --no-deps --all-features

  # ── Sprint 40 task #404: docs-vs-spec reference sync ─────────────────────
  docs-spec-sync:
    name: docs-spec-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: Check docs-vs-spec references
        run: cargo run --locked -p heimdall-ci-tools -- --check-docs

  # ── RC docs-freeze gate (Sprint 44 task #424) ────────────────────────────
  # From v1.0.0-rc.1 onwards, PRs that touch specification/** or docs/** must
  # include 'rc-blocker: <ID>' in their description referencing a triage entry
  # in docs/audit/findings-triage.md.  Non-blocker doc PRs are rejected.
  # The gate is skipped on direct pushes to main (post-merge) and on PRs that
  # do not touch the frozen paths.
  docs-freeze:
    name: docs-freeze gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for frozen-path changes
        id: frozen
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$files" | grep -qE '^(specification|docs)/'; then
            echo "frozen_touched=true" >> "$GITHUB_OUTPUT"
            echo "Frozen paths touched:"
            echo "$files" | grep -E '^(specification|docs)/'
          else
            echo "frozen_touched=false" >> "$GITHUB_OUTPUT"
            echo "No frozen paths touched — freeze gate not applicable."
          fi
      - name: Enforce rc-blocker tag in PR description
        if: steps.frozen.outputs.frozen_touched == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -qiE 'rc-blocker:[[:space:]]*[A-Za-z0-9_-]+'; then
            echo "rc-blocker tag found — freeze gate satisfied."
          else
            echo "::error::Docs-freeze violation: this PR modifies specification/** or docs/**" \
                 "but the PR description does not contain 'rc-blocker: <ID>'." \
                 "Add the tag referencing a triage entry in docs/audit/findings-triage.md," \
                 "or target a non-frozen path." >&2
            exit 1
          fi

  # ── Commit message validation (ENG-147) ────────────────────────────────────
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Conventional Commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: '.commitlintrc.json'
          failOnWarnings: false
          helpURL: 'https://www.conventionalcommits.org/'

  # ── Binary smoke gate (Sprint 54 retrospective action item) ────────────────
  # Verifies that the heimdall binary is functional (not a stub).
  # Prevents a repeat of the v1.0.0 non-functional placeholder incident.
  smoke-binary:
    name: smoke-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Build heimdall binary
        run: cargo build -p heimdall
      - name: Verify binary is not a stub
        run: |
          bin="target/debug/heimdall"
          # 'heimdall version' must exit 0 and print valid JSON.
          output=$("$bin" version 2>&1) || { echo "::error::heimdall version failed"; exit 1; }
          echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'version' in d, 'missing version field'" \
            || { echo "::error::heimdall version did not return JSON with a version field"; exit 1; }
          echo "Binary smoke: OK — version=$(echo $output | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"version\"])')"
