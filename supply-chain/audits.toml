"""

[[audits.tokio]]
criteria = "safe-to-deploy"
version = "1.52.1"
notes = """
tokio 1.52.1 reviewed by Heimdall maintainer (@flaviocfo, 2026-04-27).
Core async runtime (ADR-0026).  Unsafe usage is inherent to async I/O on
all supported platforms; the unsafe blocks are well-documented and the tokio
