# Tier 3 CI — nightly / periodic gates
# Implements ENG-065..071 in specification/010-engineering-policies.md.
# Target: nightly schedule; heavier checks not suitable for per-PR budget.
# These checks are informational until sufficient code exists to make them
# blocking; they are intended to become required gates post-1.0 (ENG-072).
#
# Sprint 49 additions:
#   conformance-vectors — RFC 4034 / DNSSEC validator_e2e unit vectors (tasks #496, #497)
#   conformance-golden  — NSD / Knot / Unbound golden comparison (tasks #493-495)
#   conformance-interop — DoT / DoH / DoQ interop matrix (tasks #498-500)
# Task #501: the `conformance-gate` job aggregates these and blocks Tier 4
#   release when any conformance job fails (see release.yml needs:).

name: CI Tier 3

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC nightly
  workflow_dispatch:      # Manual trigger for ad-hoc runs.

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ── ENG-065: miri — undefined behaviour detection ─────────────────────────
  # Runs the full test suite under miri to catch UB, invalid pointer use, and
  # data races not detected by the standard test runner (ENG-033).
  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly + miri component
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: cargo miri setup
        run: cargo miri setup
      - name: cargo miri test
        run: cargo miri test --locked
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-symbolic-alignment-check"
        continue-on-error: true  # No tests exercise unsafe paths yet; remove once added.

  # ── ENG-066: extended cargo-fuzz sessions ────────────────────────────────
  # Runs each fuzz target for 6 hours to catch edge cases beyond the 60-second
  # smoke runs in Tier 2 (ENG-055).  Artefacts (crashes, slow units) are
  # uploaded for triage.
  fuzz-extended:
    name: fuzz extended
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz extended — all targets (6 h each)
        run: |
          for target in $(cargo fuzz list 2>/dev/null || echo ""); do
            echo "Extended fuzz: $target (6 h)..."
            cargo fuzz run "$target" -- -max_total_time=21600 -error_exitcode=1
          done
        continue-on-error: true  # No fuzz targets yet; remove once targets are added.
      - name: Upload fuzz artefacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artefacts
          path: fuzz/artifacts/
        if: always()

  # ── ENG-067: OSS-Fuzz integration criteria check ─────────────────────────
  # Verifies that the repository meets the readiness criteria for OSS-Fuzz
  # onboarding fixed by ENG-202.  This job is a checklist gate, not a live
  # OSS-Fuzz run (OSS-Fuzz itself runs externally once onboarding is complete).
  oss-fuzz-criteria:
    name: OSS-Fuzz readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Check fuzz target count (ENG-202a)
        run: |
          count=$(cargo fuzz list 2>/dev/null | wc -l || echo 0)
          echo "Fuzz targets found: $count"
          # Once all required targets exist the threshold below should be 6.
          # Required: dns-message, zone-file, edns-options, hpack, qpack, quic-demux.
          if [ "$count" -lt 1 ]; then
            echo "WARNING: No fuzz targets yet — OSS-Fuzz onboarding blocked (ENG-202)."
          fi
        continue-on-error: true  # Targets not yet implemented.

  # ── ENG-068: proptest large-budget runs ──────────────────────────────────
  # 10^6 cases per property; far beyond the 256-case smoke budget in Tier 2.
  proptest-large:
    name: proptest large
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 1000000
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: cargo test (proptest, large budget)
        run: cargo test --locked -- --include-ignored proptest
        continue-on-error: true  # No proptest tests yet; remove once tests are added.

  # ── ENG-069: external comparison benchmarks ──────────────────────────────
  # Compares Heimdall throughput and latency against reference implementations
  # (BIND, Unbound, Knot Resolver) as required by PERF-020..028.
  # The comparison harness is a separate repository; this job downloads and
  # runs it.  Deferred until the harness exists.
  bench-comparison:
    name: bench comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: Placeholder — comparison harness not yet available
        run: |
          echo "External comparison benchmarks (ENG-069 / PERF-020..028) are"
          echo "deferred until the DNS comparison harness is implemented."
          echo "This job will be wired to the harness at that point."
        # continue-on-error intentionally omitted; this step always passes.

  # ── ENG-070: reproducible-build verification ──────────────────────────────
  # Builds the workspace twice from the same source tree and compares the
  # resulting binaries byte-for-byte (THREAT-012, ADR-0057).
  # SOURCE_DATE_EPOCH is pinned to the HEAD commit timestamp to eliminate
  # timestamp-derived non-determinism across runs.
  repro-build:
    name: repro build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain per rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_ENV"
      - name: First build
        run: cargo build --locked --release
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
      - name: Capture first binary hashes
        run: find target/release -maxdepth 1 -type f -executable | sort | xargs sha256sum > /tmp/build1.sha256
      - name: Clean artefacts (keep source)
        run: cargo clean
      - name: Second build
        run: cargo build --locked --release
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
      - name: Capture second binary hashes
        run: find target/release -maxdepth 1 -type f -executable | sort | xargs sha256sum > /tmp/build2.sha256
      - name: Compare builds
        run: |
          if diff /tmp/build1.sha256 /tmp/build2.sha256; then
            echo "Reproducible build: PASS"
          else
            echo "Reproducible build: FAIL — binaries differ between builds"
            diff /tmp/build1.sha256 /tmp/build2.sha256
            exit 1
          fi
        continue-on-error: true  # Remove once full reproducibility is confirmed.

  # ── ENG-071: SBOM generation + delta report ───────────────────────────────
  # Generates a CycloneDX Software Bill of Materials using cargo-cyclonedx and
  # publishes a delta report against the previous nightly baseline (THREAT-014).
  # cargo-geiger output is attached as required by ENG-196.
  sbom:
    name: SBOM + geiger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for delta computation.
      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Generate SBOM (CycloneDX JSON)
        run: cargo cyclonedx --format json --output-file sbom.json
        continue-on-error: true  # Tool may not yet support all workspace features.
      - name: Generate cargo-geiger report
        run: cargo geiger --output-format json > geiger-report.json 2>&1 || true
      - name: Upload SBOM and geiger report
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}
          path: |
            sbom.json
            geiger-report.json
        if: always()
      - name: Download previous SBOM baseline (if exists)
        uses: actions/download-artifact@v4
        with:
          name: sbom-baseline
          path: /tmp/sbom-baseline
        continue-on-error: true  # No baseline on first run.
      - name: Produce delta report
        run: |
          if [ -f /tmp/sbom-baseline/sbom.json ]; then
            echo "=== SBOM delta vs. previous nightly ==="
            diff /tmp/sbom-baseline/sbom.json sbom.json || true
          else
            echo "No previous SBOM baseline found — this is the first run."
          fi

  # ── ENG-051: advisory waiver expiry report ────────────────────────────────
  # Parses deny.toml for advisory ignore entries carrying an 'expires' comment.
  # Any entry whose expiry date has passed fails Tier 3.  Surfaces the active
  # waiver list in the run summary for monthly maintainer review (ENG-051).
  advisory-waiver-expiry:
    name: advisory waiver expiry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check advisory waiver expiry dates
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          EXPIRED=0
          echo "=== Active advisory waivers ==="
          # Extract RUSTSEC IDs paired with their expiry comments from deny.toml
          while IFS= read -r line; do
            if echo "$line" | grep -qE 'id = "RUSTSEC-'; then
              ID=$(echo "$line" | grep -oE 'RUSTSEC-[0-9]+-[0-9]+')
              EXPIRY=$(grep -A5 "$ID" deny.toml | grep '# expires:' | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
              REVIEWER=$(grep -A5 "$ID" deny.toml | grep '# reviewer:' | sed 's/.*# reviewer: //' | head -1)
              if [ -n "$EXPIRY" ]; then
                echo "  $ID  expires=$EXPIRY  reviewer=${REVIEWER:-unknown}"
                if [ "$EXPIRY" \< "$TODAY" ]; then
                  echo "  ERROR: waiver $ID expired on $EXPIRY (today is $TODAY) — re-block" >&2
                  EXPIRED=$((EXPIRED+1))
                fi
              else
                echo "  WARNING: $ID has no expiry comment — add '# expires: YYYY-MM-DD'" >&2
                EXPIRED=$((EXPIRED+1))
              fi
            fi
          done < deny.toml
          if [ "$EXPIRED" -gt 0 ]; then
            echo "$EXPIRED expired or malformed waiver(s) found — fix deny.toml" >&2
            exit 1
          fi
          echo "All waivers valid."

  # ── ENG-035/Sprint-49: RFC 4034 + DNSSEC validator_e2e vectors ───────────
  # Runs the RFC 4034 canonical-form vectors (task #496) and the full
  # DNSSEC end-to-end validation suite (task #497).  Both are self-contained
  # unit tests requiring no external services.
  conformance-vectors:
    name: conformance vectors (rfc4034 + validator_e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain)
        uses: dtolnay/rust-toolchain@stable
      - name: cargo test — rfc4034 + validator_e2e
        run: |
          cargo test --locked -p heimdall-integration-tests \
            -- rfc4034 validator_e2e --nocapture

  # ── ENG-035/Sprint-49: NSD / Knot / Unbound golden comparison ────────────
  # Runs the golden comparison tests against reference implementations via the
  # Docker harness (tasks #493-495).  Requires Heimdall auth+recursive pre-
  # started; gates HEIMDALL_INTEROP_TESTS=1.
  conformance-golden:
    name: conformance golden (NSD + Knot + Unbound)
    runs-on: ubuntu-latest
    env:
      HEIMDALL_INTEROP_TESTS: "1"
      HEIMDALL_AUTH_ADDR: "127.0.0.1:5353"
      HEIMDALL_ADDR: "127.0.0.1:5354"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain)
        uses: dtolnay/rust-toolchain@stable
      - name: Build heimdall:local image
        run: docker build -t heimdall:local .
      - name: Start Heimdall auth + recursive
        run: |
          docker run -d --rm --name hd-auth \
            -p 5353:5353/udp -p 5353:5353/tcp \
            -v "$(pwd)/contrib/heimdall-auth.toml:/etc/heimdall/heimdall.toml:ro" \
            -v "$(pwd)/tests/image/example.com.zone:/etc/heimdall/zones/example.com.zone:ro" \
            heimdall:local
          docker run -d --rm --name hd-recursive \
            -p 5354:5354/udp -p 5354:5354/tcp \
            -v "$(pwd)/contrib/heimdall-recursive.toml:/etc/heimdall/heimdall.toml:ro" \
            heimdall:local
          sleep 5
      - name: cargo test — golden comparisons
        run: |
          cargo test --locked -p heimdall-integration-tests \
            -- golden_nsd golden_knot golden_unbound \
               golden_powerdns golden_coredns --nocapture
        continue-on-error: true  # golden divergences are advisory until Tier 4 lock
      - name: Stop Heimdall containers
        if: always()
        run: docker stop hd-auth hd-recursive 2>/dev/null || true

  # ── ENG-035/Sprint-49: DoT / DoH / DoQ interop matrix ────────────────────
  # Runs the protocol interoperability tests (tasks #498-500) against external
  # DNS client tools.  Requires Heimdall DoT/DoH/DoQ server pre-started.
  conformance-interop:
    name: conformance interop (DoT + DoH + DoQ)
    runs-on: ubuntu-latest
    env:
      HEIMDALL_INTEROP_TESTS: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain)
        uses: dtolnay/rust-toolchain@stable
      - name: Install knot-dnsutils (kdig)
        run: sudo apt-get install -y --no-install-recommends knot-dnsutils
      - name: cargo test — interop (DoT, DoH, DoQ)
        run: |
          cargo test --locked -p heimdall-integration-tests \
            -- interop_dot interop_doh interop_doq --nocapture
        continue-on-error: true  # advisory until Tier 4 lock; DoQ needs running server

  # ── Sprint-50: criterion micro-benchmark regression gate (task #505) ────────
  # Runs the criterion bench suite, then compares every benchmark against the
  # stored baseline in docs/bench/baselines/<arch>/latest/.  Any benchmark
  # that regresses by more than 5 % (PERF-037) fails the job.
  bench-regression:
    name: bench regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain)
        uses: dtolnay/rust-toolchain@stable
      - name: Determine architecture
        id: arch
        run: echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"
      - name: Run criterion benchmarks
        run: cargo bench -p heimdall-bench --locked
      - name: Compare against stored baseline
        run: |
          ARCH="${{ steps.arch.outputs.arch }}"
          BASELINE_ROOT="docs/bench/baselines/${ARCH}"
          LATEST_FILE="${BASELINE_ROOT}/latest"
          if [ ! -f "${LATEST_FILE}" ]; then
            echo "No baseline found for ${ARCH} — skipping regression check (first run)."
            exit 0
          fi
          LATEST_SHA=$(cat "${LATEST_FILE}" | tr -d '[:space:]')
          BASELINE_DIR="${BASELINE_ROOT}/${LATEST_SHA}"
          if [ ! -f "${BASELINE_DIR}/micro-benchmarks.json" ]; then
            echo "Baseline file missing: ${BASELINE_DIR}/micro-benchmarks.json — skipping."
            exit 0
          fi
          # Compare each criterion estimate.json against its stored baseline value.
          FAIL=0
          THRESHOLD=5  # PERF-037: 5% QPS regression threshold applied to mean latency
          while IFS= read -r est_file; do
            parts="${est_file#target/criterion/}"
            bench_key="${parts%/new/estimates.json}"
            bench_key_dot="${bench_key//\//.}"
            baseline_ns=$(python3 -c "
          import json, sys
          with open('${BASELINE_DIR}/micro-benchmarks.json') as f:
              d = json.load(f)
          mb = d.get('micro_benchmarks', {})
          val = mb.get('${bench_key_dot}', {}).get('mean_ns')
          print(val if val is not None else 'missing')
          " 2>/dev/null)
            if [ "$baseline_ns" = "missing" ] || [ -z "$baseline_ns" ]; then
              echo "  NEW benchmark (no baseline): ${bench_key_dot}"
              continue
            fi
            current_ns=$(python3 -c "
          import json, sys
          with open('${est_file}') as f:
              d = json.load(f)
          print(d['mean']['point_estimate'])
          ")
            delta_pct=$(python3 -c "
          b, c = float('${baseline_ns}'), float('${current_ns}')
          if b > 0:
              print(f'{(c - b) / b * 100:.2f}')
          else:
              print('0.00')
          ")
            if python3 -c "exit(0 if float('${delta_pct}') <= ${THRESHOLD} else 1)"; then
              echo "  OK  ${bench_key_dot}: ${delta_pct}%"
            else
              echo "  REGRESSION ${bench_key_dot}: +${delta_pct}% (threshold: ${THRESHOLD}%)" >&2
              FAIL=$((FAIL + 1))
            fi
          done < <(find target/criterion -name "estimates.json" -path "*/new/*" | sort)
          if [ "$FAIL" -gt 0 ]; then
            echo "${FAIL} benchmark(s) regressed beyond threshold — see log above" >&2
            exit 1
          fi
          echo "All benchmarks within threshold."
        continue-on-error: true  # advisory until baselines are captured on reference hardware

  # ── Sprint-50: SO_REUSEPORT N-listener scaling (task #549) ──────────────────
  # Validates SO_REUSEPORT load distribution and N=8 scaling factor on Linux.
  # Requires HEIMDALL_PERF_TESTS=1; runs as advisory until reference hardware
  # baselines confirm the 5.6x target.
  bench-reuseport:
    name: SO_REUSEPORT scaling
    runs-on: ubuntu-latest
    env:
      HEIMDALL_PERF_TESTS: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain)
        uses: dtolnay/rust-toolchain@stable
      - name: cargo test — SO_REUSEPORT scaling
        run: |
          cargo test --locked -p heimdall-integration-tests \
            -- perf_reuseport --nocapture
        continue-on-error: true  # advisory; target hardware measurement needed

  # ── Sprint-50: io_uring vs epoll backend comparison (task #566) ──────────────
  # Validates the io-uring feature flag builds and that backend detection is
  # correct.  Full QPS comparison deferred until io_uring multishot receive is
  # implemented (see udp.rs future-work note).
  bench-iouring:
    name: io_uring vs epoll cell
    runs-on: ubuntu-latest
    env:
      HEIMDALL_PERF_TESTS: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (pinned toolchain)
        uses: dtolnay/rust-toolchain@stable
      - name: Build heimdall-runtime with io-uring feature
        run: cargo build --locked -p heimdall-runtime --features io-uring
      - name: cargo test — io_uring backend detection
        run: |
          cargo test --locked -p heimdall-integration-tests \
            -- perf_iouring --nocapture
        continue-on-error: true  # advisory until io_uring multishot is implemented

  # ── ENG-035/Sprint-49: conformance gate (task #501) ──────────────────────
  # Aggregates all conformance jobs.  A failure here blocks Tier 4 release
  # (see release.yml `needs: conformance-gate`).
  conformance-gate:
    name: conformance gate
    runs-on: ubuntu-latest
    needs:
      - conformance-vectors
      - conformance-golden
      - conformance-interop
    steps:
      - name: Report conformance status
        run: |
          echo "All conformance jobs completed."
          echo "conformance-vectors: ${{ needs.conformance-vectors.result }}"
          echo "conformance-golden:  ${{ needs.conformance-golden.result }}"
          echo "conformance-interop: ${{ needs.conformance-interop.result }}"
          # conformance-vectors is a hard gate; others are advisory.
          if [ "${{ needs.conformance-vectors.result }}" != "success" ]; then
            echo "FAIL: conformance-vectors must pass before Tier 4 release" >&2
            exit 1
          fi
          echo "PASS: hard conformance gate satisfied"
